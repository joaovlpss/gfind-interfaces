  <script type="text/babel">
/* global React */
const { useState, useRef, useEffect, useLayoutEffect, createContext, useContext } = React;

/* ---------------- Icon ---------------- */
function Icon({ name, size = 24, fill = false, className = "", style }) {
  const cls = ["msym", `s${size}`, fill ? "fill" : "", className].filter(Boolean).join(" ");
  return <span className={cls} style={style} aria-hidden="true">{name}</span>;
}

/* ---------------- Button ---------------- */
function Button({ variant = "text", size, startIcon, endIcon, children, className = "", neutral, block, notext, ...rest }) {
  const cls = [
    "btn",
    variant === "contained" ? "btn-contained" :
    variant === "secondary" ? "btn-secondary" :
    variant === "outlined" ? "btn-outlined" : "btn-text",
    neutral ? "neutral" : "",
    size === "sm" ? "btn-sm" : size === "lg" ? "btn-lg" : "",
    block ? "btn-block" : "", notext ? "notext" : "", className,
  ].filter(Boolean).join(" ");
  return (
    <button className={cls} {...rest}>
      {startIcon && <Icon name={startIcon} />}
      {children}
      {endIcon && <Icon name={endIcon} />}
    </button>
  );
}

function IconButton({ name, size = 24, fill = false, className = "", btnSize, ...rest }) {
  return (
    <button className={["icon-btn", btnSize === "sm" ? "sm" : "", className].filter(Boolean).join(" ")} {...rest}>
      <Icon name={name} size={size} fill={fill} />
    </button>
  );
}

/* ---------------- Chip ---------------- */
function Chip({ label, icon, color, outlined, selected, onClick, onDelete, size, className = "" }) {
  const cls = [
    "chip",
    color === "primary" ? "chip-primary" : color === "secondary" ? "chip-secondary" : color === "ti" ? "chip-ti" : "",
    outlined ? "outlined" : "", selected ? "selected" : "",
    onClick ? "clickable" : "", size === "sm" ? "sm" : "", className,
  ].filter(Boolean).join(" ");
  return (
    <span className={cls} onClick={onClick} role={onClick ? "button" : undefined} tabIndex={onClick ? 0 : undefined}
      onKeyDown={onClick ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick(e); } } : undefined}>
      {icon && <Icon name={icon} size={16} />}
      {label}
      {onDelete && (
        <span className="chip-x" onClick={(e) => { e.stopPropagation(); onDelete(e); }} role="button" aria-label="Remover">
          <Icon name="close" size={14} />
        </span>
      )}
    </span>
  );
}

/* ---------------- Card ---------------- */
function Card({ children, hoverable, flat, elevated, className = "", ...rest }) {
  const cls = ["card", hoverable ? "hoverable" : "", flat ? "flat" : "", elevated ? "elevated" : "", className].filter(Boolean).join(" ");
  return <div className={cls} {...rest}>{children}</div>;
}

/* ---------------- TextField ---------------- */
function TextField({ label, value, onChange, placeholder, type = "text", icon, endIcon, hint, error, multiline, rows = 3, onKeyDown, onBlur, autoFocus, className = "", inputMode, name }) {
  return (
    <div className={["field", error ? "error" : "", className].filter(Boolean).join(" ")}>
      {label && <label>{label}</label>}
      <div className={["control", multiline ? "area" : ""].filter(Boolean).join(" ")}>
        {icon && <Icon name={icon} size={20} />}
        {multiline
          ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} onKeyDown={onKeyDown} onBlur={onBlur} autoFocus={autoFocus} name={name} />
          : <input type={type} value={value} onChange={onChange} placeholder={placeholder} onKeyDown={onKeyDown} onBlur={onBlur} autoFocus={autoFocus} inputMode={inputMode} name={name} />}
        {endIcon}
      </div>
      {hint && <span className="hint">{hint}</span>}
    </div>
  );
}

function Select({ label, value, onChange, children, hint, className = "" }) {
  return (
    <div className={["field", className].filter(Boolean).join(" ")}>
      {label && <label>{label}</label>}
      <div className="control select-wrap" style={{ paddingRight: 4 }}>
        <select value={value} onChange={onChange}>{children}</select>
        <Icon name="expand_more" size={20} className="arrow" />
      </div>
      {hint && <span className="hint">{hint}</span>}
    </div>
  );
}

/* ---------------- SearchableSelect ---------------- */
function SearchableSelect({ label, value, onChange, options = [], hint, placeholder = "Selecionar…", className = "" }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const wrapRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const h = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setOpen(false);
        setQuery("");
      }
    };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);

  const norm = (s) => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const filtered = query.trim() ? options.filter((o) => norm(o).includes(norm(query.trim()))) : options;

  const select = (opt) => {
    onChange({ target: { value: opt } });
    setOpen(false);
    setQuery("");
  };

  const handleToggle = () => {
    const next = !open;
    setOpen(next);
    if (next) setTimeout(() => inputRef.current?.focus(), 40);
    else setQuery("");
  };

  return (
    <div className={["field", className].filter(Boolean).join(" ")} style={{ position: "relative" }} ref={wrapRef}>
      {label && <label>{label}</label>}
      <div
        className="control select-wrap"
        style={{ paddingRight: 12, cursor: "pointer", background: open ? "var(--bg-sunken)" : undefined }}
        onClick={handleToggle}
      >
        {open ? (
          <input
            ref={inputRef}
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Filtrar opções…"
            onClick={(e) => e.stopPropagation()}
            onKeyDown={(e) => {
              if (e.key === "Escape") { setOpen(false); setQuery(""); }
              if (e.key === "Enter" && filtered.length === 1) select(filtered[0]);
            }}
            style={{ border: "none", outline: "none", background: "transparent", width: "100%", fontSize: "inherit", color: "var(--text-primary)" }}
          />
        ) : (
          <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", color: value ? "var(--text-primary)" : "var(--text-disabled)" }}>
            {value || placeholder}
          </span>
        )}
        <Icon name={open ? "expand_less" : "expand_more"} size={20} className="arrow" style={{ flexShrink: 0 }} />
      </div>
      {open && (
        <div style={{
          position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 300,
          background: "var(--paper)", border: "1px solid var(--divider-strong)",
          borderRadius: 8, boxShadow: "var(--e3, var(--e2))",
          maxHeight: 260, overflowY: "auto",
        }}>
          {filtered.length === 0 ? (
            <div style={{ padding: "10px 16px", color: "var(--text-secondary)", fontSize: ".85rem" }}>Nenhuma opção encontrada</div>
          ) : filtered.map((opt) => (
            <div
              key={opt}
              className="menu-item"
              style={opt === value ? { background: "var(--primary-050)", fontWeight: 600 } : {}}
              onClick={(e) => { e.stopPropagation(); select(opt); }}
            >
              {opt === value
                ? <Icon name="check" size={18} style={{ color: "var(--primary)", flexShrink: 0 }} />
                : <span style={{ width: 18, flexShrink: 0 }} />}
              <span>{opt}</span>
            </div>
          ))}
        </div>
      )}
      {hint && <span className="hint">{hint}</span>}
    </div>
  );
}

/* ---------------- Switch ---------------- */
function Switch({ checked, onChange, label }) {
  return (
    <label className="switch">
      <input type="checkbox" checked={checked} onChange={onChange} />
      <span className="track"><span className="thumb" /></span>
      {label && <span>{label}</span>}
    </label>
  );
}

/* ---------------- ToggleGroup ---------------- */
function ToggleGroup({ options, value, onChange, multiple }) {
  const isOn = (v) => multiple ? value.includes(v) : value === v;
  const toggle = (v) => {
    if (multiple) onChange(value.includes(v) ? value.filter((x) => x !== v) : [...value, v]);
    else onChange(value === v ? "" : v);
  };
  return (
    <div className="toggle-group">
      {options.map((o) => (
        <button key={o.value} className={["tg-btn", isOn(o.value) ? "on" : ""].filter(Boolean).join(" ")} onClick={() => toggle(o.value)}>
          {o.label}
        </button>
      ))}
    </div>
  );
}

/* ---------------- Avatar ---------------- */
function Avatar({ children, size = 40, color = "#1976d2", round, src, alt, style, className = "" }) {
  return (
    <span className={["avatar", round ? "round" : "", className].filter(Boolean).join(" ")}
      style={{ width: size, height: size, background: src ? "transparent" : color, fontSize: size * 0.4, ...style }}>
      {src ? <img src={src} alt={alt} /> : children}
    </span>
  );
}

/* ---------------- Relevance bar ---------------- */
function describeRelevance(score) {
  const percent = Math.round(score * 100);
  if (score >= 0.75) return { label: "Alta aderência", color: "var(--success)", textColor: "var(--secondary-dark)", percent };
  if (score >= 0.55) return { label: "Média aderência", color: "var(--warning)", textColor: "#8a5300", percent };
  return { label: "Baixa aderência", color: "var(--text-disabled)", textColor: "var(--text-secondary)", percent };
}
function RelevanceBar({ score }) {
  const { label, color, textColor, percent } = describeRelevance(score);
  return (
    <div className="relbar-wrap" title={`Similaridade: ${percent}%`}>
      <div className="row spread" style={{ marginBottom: 5 }}>
        <span className="t-cap" style={{ fontWeight: 600, color: textColor }}>{label}</span>
        <span className="t-cap text-secondary">{percent}%</span>
      </div>
      <div className="relbar-track"><div className="relbar-fill" style={{ width: `${percent}%`, background: color }} /></div>
    </div>
  );
}

/* ---------------- Menu (popover anchored) ---------------- */
function Menu({ open, onClose, anchorRef, children, align = "right", width }) {
  const ref = useRef(null);
  const [pos, setPos] = useState(null);
  useLayoutEffect(() => {
    if (open && anchorRef?.current) {
      const r = anchorRef.current.getBoundingClientRect();
      setPos({ top: r.bottom + 6, left: align === "right" ? r.right : r.left });
    }
  }, [open]);
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target) && !anchorRef?.current?.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);
  if (!open || !pos) return null;
  const style = { top: pos.top, position: "fixed", width, zIndex: 200 };
  if (align === "right") style.right = window.innerWidth - pos.left; else style.left = pos.left;
  // Portal to <body> so the fixed menu escapes any transformed/animated card
  // ancestor (e.g. .fade-in) that would otherwise become its containing block
  // and trap it inside the card's stacking context.
  return ReactDOM.createPortal(<div className="menu" ref={ref} style={style}>{children}</div>, document.body);
}
function MenuItem({ icon, children, onClick, danger }) {
  return (
    <div className={["menu-item", danger ? "danger" : ""].filter(Boolean).join(" ")} onClick={onClick}>
      {icon && <Icon name={icon} size={20} />}<span>{children}</span>
    </div>
  );
}

/* ---------------- Dialog ---------------- */
function Dialog({ open, onClose, children, width }) {
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open]);
  if (!open) return null;
  return (
    <div className="scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="dialog" style={width ? { maxWidth: width } : undefined}>{children}</div>
    </div>
  );
}

/* ---------------- Inline alert ---------------- */
function InlineAlert({ severity = "info", icon, title, children, action }) {
  const def = { error: "error", info: "info", success: "check_circle", warn: "warning" }[severity];
  return (
    <div className={`alert alert-${severity}`}>
      <Icon name={icon || def} size={22} />
      <div className="grow">
        {title && <div className="t-sub2" style={{ marginBottom: 2 }}>{title}</div>}
        <div className="t-body2">{children}</div>
      </div>
      {action}
    </div>
  );
}

/* ---------------- Skeleton ---------------- */
function Skeleton({ w = "100%", h = 16, r = 4, style }) {
  return <div className="skl" style={{ width: w, height: h, borderRadius: r, ...style }} />;
}

Object.assign(window, {
  Icon, Button, IconButton, Chip, Card, TextField, Select, SearchableSelect, Switch, ToggleGroup,
  Avatar, RelevanceBar, describeRelevance, Menu, MenuItem, Dialog, InlineAlert, Skeleton,
});

  </script>

  const seed = query ? query.length : 0;
  res = res.map((c, i) => ({ ...c, score: Math.max(0.42, Math.min(0.97, c.score - ((seed + i) % 5) * 0.012)) }));

/* Migração: o modelo antigo tinha "estudando" como etapa. Agora vira "inscrito" + marcador de estudo. */
function migrateState(s) {
  if (!s) return s;
  if (!s.studyMark) s.studyMark = {};
  if (s.tracking) {
    const t = { ...s.tracking };
    let changed = false;
    Object.keys(t).forEach((k) => {
      if (t[k] === "estudando") {
        t[k] = "inscrito";
        if (!s.studyMark[k]) s.studyMark[k] = { desde: "2026-04-01" };
        changed = true;
      }
    });
    if (changed) s.tracking = t;
  }
  return s;
}
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return migrateState({ ...DEFAULT_STATE, ...JSON.parse(raw) });
  } catch (e) { /* ignore */ }
  return DEFAULT_STATE;
}

    });
  }, []);

  const toggleStudyMark = useCallback((c) => {
    const k = cargoKey(c);
    setState((s) => {
      const next = { ...(s.studyMark || {}) };
      if (next[k]) delete next[k];
      else next[k] = { desde: new Date().toISOString().slice(0, 10) };
      return { ...s, studyMark: next };
    });
  }, []);

  const toggleResultNotify = useCallback((id) => {

      const next = { ...(s.resultNotify || {}) };
      if (next[id]) delete next[id]; else next[id] = true;
      return { ...s, resultNotify: next };
    });
  }, []);

  const toggleStudying = useCallback((forecastId, desde) => {
    setState((s) => {
      const next = { ...s.studying };
      if (next[forecastId]) delete next[forecastId];
      else next[forecastId] = { desde: desde || new Date().toISOString().slice(0, 10) };
      return { ...s, studying: next };
    });
  }, []);

  const pushHistory = useCallback((q) => {
    setState((s) => ({ ...s, history: [q, ...s.history.filter((x) => x !== q)].slice(0, 8) }));
  }, []);
  const clearHistory = useCallback(() => setState((s) => ({ ...s, history: [] })), []);

  const addAlert = useCallback((alert) => {
    setState((s) => ({ ...s, alerts: [{ id: "al" + Date.now(), novos: 0, ativo: true, ...alert }, ...s.alerts] }));
  }, []);
  const updateAlert = useCallback((id, upd) => {

  }, []);
  const removeAlert = useCallback((id) => {

/* ---------------- SearchBar ---------------- */
function SearchBar({ initialQuery = "", initialOnlyTi = false, hero = false, compact = false, autoFocus = false, onSearch }) {
  const [q, setQ] = uS(initialQuery);
  const [onlyTi, setOnlyTi] = uS(initialOnlyTi);
  const MAX = 280;
  const trimmed = q.trim();
  const tooLong = q.length > MAX;
  const canSubmit = trimmed.length > 0 && !tooLong;
  const submit = () => { if (canSubmit) onSearch(trimmed, onlyTi); };

  const pill = (
    <div className={["searchbar", hero ? "hero" : ""].filter(Boolean).join(" ")} style={compact ? { flex: 1, boxShadow: "var(--e1)" } : undefined}>
      <Icon name="search" size={hero ? 26 : 22} className="text-secondary" />
      <textarea
        rows={1} value={q} autoFocus={autoFocus}
        placeholder={hero ? "Descreva o cargo: tecnologias, atividades ou título…" : "Refinar busca…"}
        onChange={(e) => setQ(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); } }}
      />
      {q && <IconButton name="close" size={20} btnSize="sm" onClick={() => setQ("")} aria-label="Limpar" type="button" />}
      <IconButton name="arrow_forward" onClick={submit} disabled={!canSubmit}
        aria-label="Buscar" type="submit"
        style={{ background: canSubmit ? "var(--primary)" : "var(--bg-sunken)", color: canSubmit ? "#fff" : "var(--text-disabled)" }} />
    </div>
  );

  if (compact) {
    return (
      <form onSubmit={(e) => { e.preventDefault(); submit(); }} className="row gap-1" style={{ alignItems: "center" }}>
        {pill}
      </form>
    );
  }

  return (
    <form onSubmit={(e) => { e.preventDefault(); submit(); }}>
      {pill}
      <div className="row" style={{ marginTop: hero ? 14 : 8, padding: "0 8px", justifyContent: "flex-end" }}>
        <span className="t-cap" style={{ color: tooLong ? "var(--error)" : "var(--text-secondary)" }}>
          {tooLong ? `Máximo de ${MAX} caracteres` : `${q.length}/${MAX}`}
        </span>
      </div>
    </form>
  );
}

/* ---------------- Notifications center ---------------- */
function buildNotifications(state, isResultNotify) {
  const items = [];
  // Acompanhamento — convocações se aproximando (pós-resultado)
  (window.RESULTADOS || []).forEach((r) => {
    const st = window.resultStatus(r);
    if (st.estado === "chegando" && isResultNotify(r.id)) {
      items.push({
        id: "conv-" + r.id, tone: "warn", icon: "notifications_active",
        title: `Convocação chegando — ${r.sigla}`,
        text: `Faltam ${st.faltam} ${st.faltam === 1 ? "posição" : "posições"} para a sua vez em ${r.cargo}.`,
        when: `há ${r.sync_horas}h`,
        route: { name: "tracking", params: { tab: "resultados" } },
      });
    }
  });
  // Alertas — novos editais compatíveis
  (state.alerts || []).forEach((al) => {
    if (al.ativo && al.novos > 0) {
      items.push({
        id: "al-" + al.id, tone: "primary", icon: "campaign",
        title: `${al.novos} ${al.novos > 1 ? "novos editais compatíveis" : "novo edital compatível"}`,
        text: `Do seu alerta “${al.nome || al.query}”.`,
        when: "hoje",
        route: { name: "results", params: { q: al.query, ti: al.onlyTi }, clearAlert: al.id },
      });
    }
  });
  // Aguardando edital — concursos estudados cujo edital foi autorizado
  const studyingIds = Object.keys(state.studying || {});
  (window.FORECASTS || []).forEach((f) => {
    if (studyingIds.includes(f.id) && f.situacao === "autorizado") {
      items.push({
        id: "fc-" + f.id, tone: "secondary", icon: "verified",
        title: `Edital autorizado — ${f.sigla}`,
        text: `${f.cargo}. Previsão: ${f.previsao}.`,
        when: "há 1 dia",
        route: { name: "tracking", params: { tab: "previstos" } },
      });
    }
  });
  return items;
}

function NotificationsPanel({ open, onClose, anchorRef }) {
  const { state, navigate, isResultNotify, updateAlert } = useApp();
  const items = buildNotifications(state, isResultNotify);
  const go = (it) => {
    onClose();

        </div>
      ) : (
        <div className="notif-list">
          {items.map((it) => (
            <button key={it.id} className="notif-item" onClick={() => go(it)}>
              <span className={`notif-ic tone-${it.tone}`}><Icon name={it.icon} size={20} /></span>
              <span className="notif-body">
                <span className="notif-title">{it.title}</span>

  );
}

function Rail() {

  return (

function CardActions({ cargo, onCompare, compareOn, compact, favCtl }) {

      <div style={{ position: "relative" }} ref={trackRef}>

        </Menu>
      </div>
    </div>
  );
}

        <Card key={i} flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
          <div className="card-body row" style={{ gap: 16, alignItems: "flex-start" }}>
            <Skeleton w={48} h={48} r={8} />
            <div className="grow">
              <div className="row spread"><Skeleton w="50%" h={22} /><Skeleton w={150} h={28} r={6} /></div>
              <Skeleton w="32%" h={14} style={{ marginTop: 10 }} />
              <div className="row gap-2" style={{ marginTop: 16 }}><Skeleton w={90} h={14} /><Skeleton w={90} h={14} /><Skeleton w={120} h={14} /></div>
            </div>
          </div>
        </Card>
      ))}
    </div>
  );
}

function ResultsPage() {
  const { route, navigate, pushHistory, showToast, addAlert } = useApp();
  const q = route.params.q || "";
  const ti = !!route.params.ti;
  const [filters, setFilters] = rS({ uf: "", orgao: "", nivel: [], salarioMin: 0 });
  const [status, setStatus] = rS("loading");
  const [results, setResults] = rS([]);
  const [compare, setCompare] = rS([]);
  const [forceError, setForceError] = rS(false);

  rE(() => {
    setStatus("loading");
    const t = setTimeout(() => {
      if (forceError) { setStatus("error"); return; }
      const r = runSemanticSearch(q, { onlyTi: ti, ...filters });
      setResults(r); setStatus("success"); pushHistory(q);
    }, 850);
    return () => clearTimeout(t);
  }, [q, ti, JSON.stringify(filters), forceError]);

  const toggleCompare = (c) => {
    const k = cargoKey(c);
    setCompare((cur) => cur.includes(k) ? cur.filter((x) => x !== k) : cur.length >= 3 ? (showToast("Compare até 3 cargos"), cur) : [...cur, k]);
  };

  const run = (nq, nti) => navigate("results", { q: nq, ti: nti });

  return (
    <div className="page">
      <FilterPanel filters={filters} onChange={setFilters} count={status === "success" ? results.length : null} />

      <div className="row spread wrap" style={{ marginBottom: 18, gap: 12 }}>
        <div className="row wrap gap-1">
          <span className="t-body2 text-secondary">{status === "success" ? `${results.length} resultado${results.length !== 1 ? "s" : ""} para` : "Resultados para"}</span>
          <Chip label={q} size="sm" color="primary" />
        </div>
        <Button variant="outlined" size="sm" startIcon="notification_add"
          onClick={() => { addAlert({ nome: q.slice(0, 32), query: q, onlyTi: ti, uf: filters.uf || "Nacional", freq: "diario" }); showToast("Alerta criado para esta busca", { label: "Ver alertas", onClick: () => navigate("alerts") }); }}>
          Criar alerta desta busca
        </Button>
      </div>

      {status === "loading" && <LoadingSkeleton />}
      {status === "error" && (
        <InlineAlert severity="error" title="Não foi possível concluir a busca"
          action={<Button variant="text" size="sm" startIcon="replay" onClick={() => { setForceError(false); setFilters((f) => ({ ...f })); }}>Tentar novamente</Button>}>
          Erro inesperado ao consultar o serviço semântico. Tente novamente.
        </InlineAlert>
      )}
      {status === "success" && results.length === 0 && (
        <div className="empty-wrap">
          <Icon name="search_off" size={48} />
          <div className="t-h6" style={{ marginTop: 16 }}>Nenhum cargo correspondeu à sua busca</div>
          <p className="t-body2 text-secondary" style={{ maxWidth: 460, margin: "8px auto 0" }}>
            Não encontramos cargos suficientemente relacionados a <strong>“{q}”</strong>. Tente reformular com outros termos, tecnologias ou descrevendo as atividades do cargo.
          </p>
          <Button variant="outlined" size="sm" startIcon="tune" style={{ marginTop: 20 }} onClick={() => setFilters({ uf: "", orgao: "", nivel: [], salarioMin: 0 })}>Limpar filtros</Button>
        </div>
      )}
      {status === "success" && results.length > 0 && (
        <div className="col gap-2">
          {results.map((c) => (
            <ResultCard key={cargoKey(c)} cargo={c} onOpen={(x) => navigate("detail", { id: cargoKey(x) })}
              onCompare={toggleCompare} compareOn={compare.includes(cargoKey(c))} />
          ))}
        </div>
      )}

      {compare.length > 0 && (
        <div className="snackbar" style={{ background: "var(--paper)", color: "var(--text-primary)", border: "1px solid var(--divider)" }}>
          <Icon name="library_add_check" className="text-primaryc" />
          <span className="grow t-body2"><strong>{compare.length}</strong> selecionado{compare.length > 1 ? "s" : ""} para comparar</span>
          <Button variant="text" size="sm" className="neutral" onClick={() => setCompare([])}>Limpar</Button>
          <Button variant="contained" size="sm" startIcon="compare_arrows" disabled={compare.length < 2}
            onClick={() => navigate("compare", { ids: compare })}>Comparar</Button>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { ResultCard, FilterPanel, HomePage, ResultsPage, LoadingSkeleton, DetailBlock, DetailList });

  </script>

  <script type="text/babel">
/* global React, Icon, Button, IconButton, Chip, Card, useApp, OrgaoIcon, CardActions,
   cargoByIds, fmtDate, fmtDateShort, TRACK_LABELS, TRACK_ICONS, TRACK_ORDER, cargoKey, describeRelevance, RelevanceBar */
const { useState: dS } = React;

function parseId(id) { const i = id.lastIndexOf("-", id.lastIndexOf("-") - 1); /* not robust */ return id; }
function cargoFromKey(key) {
  // key = `${edital_id}-${cargo_id}` ; match against catalog
  return window.CARGOS.find((c) => cargoKey(c) === key) || null;
}

/* ---------------- Timeline of dates ---------------- */
function DateTimeline({ datas }) {
  const steps = [
    { k: "inscricao_ini", label: "Abertura das inscrições", icon: "event_available" },
    { k: "inscricao_fim", label: "Encerramento das inscrições", icon: "event_busy" },

  return (

          <div className="row wrap gap-1" style={{ marginTop: 12 }}>
            <Chip label={cargo.uf} icon="place" size="sm" outlined />
            <Chip label={`Banca: ${cargo.banca}`} icon="gavel" size="sm" outlined />

            <Button variant={track ? "secondary" : "outlined"} startIcon={track ? TRACK_ICONS[track] : "playlist_add"}
              endIcon="expand_more" onClick={() => setTrackOpen((v) => !v)}>

            </Button>
            {trackOpen && (
              <div className="menu" style={{ position: "absolute", top: 46, left: 0, width: 210 }}>
                {TRACK_ORDER.map((k) => (
                  <div key={k} className="menu-item" onClick={() => { setTracking(cargo, k); setTrackOpen(false); showToast(`Movido para "${TRACK_LABELS[k]}"`); }}>
                    <Icon name={TRACK_ICONS[k]} size={20} />{TRACK_LABELS[k]}

                {track && <><div className="divider" /><div className="menu-item danger" onClick={() => { setTracking(cargo, null); setTrackOpen(false); }}><Icon name="remove_circle_outline" size={20} />Remover</div></>}

          <Button variant="outlined" startIcon={inCal ? "event_available" : "calendar_add_on"}
            onClick={() => { toggleCalendar(cargo); showToast(inCal ? "Datas removidas do calendário" : "Datas adicionadas ao calendário", { label: "Ver", onClick: () => navigate("calendar") }); }}>
            {inCal ? "No calendário" : "Adicionar ao calendário"}
          </Button>
          <div className="grow" />
          <IconButton name="share" aria-label="Compartilhar" onClick={() => showToast("Link copiado")} />

              <Info icon="school" label="Escolaridade" value={cargo.escolaridade} />

          <Section icon="badge" title="Requisitos">
            <p className="t-body2 text-secondary" style={{ margin: 0 }}>{cargo.requisitos}</p>

        <div className="col gap-2" style={{ position: "sticky", top: 88 }}>

              <DateTimeline datas={cargo.datas} />
              <Button variant={inCal ? "secondary" : "outlined"} block size="sm" startIcon={inCal ? "check" : "calendar_add_on"} style={{ marginTop: 4 }}

                {inCal ? "No seu calendário" : "Adicionar datas ao calendário"}
              </Button>
            </div>
          </Card>
          <Card flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
            <div className="card-body col gap-1">

}
function Section({ icon, title, children }) {
  return (
    <Card flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
      <div className="card-body">

        {children}

}
function Info({ icon, label, value }) {
  return (
    <div className="row" style={{ gap: 12, alignItems: "flex-start" }}>
      <Icon name={icon} size={20} className="text-secondary" style={{ marginTop: 2 }} />
      <div><div className="t-cap text-secondary">{label}</div><div className="t-body2" style={{ fontWeight: 500 }}>{value}</div></div>
    </div>

}

function HistoryList({ cargo }) {
  const editions = [{ ano: 2026, vagas: cargo.vagas, banca: cargo.banca, current: true }, ...window.historicoOf(cargo)];
  const maxV = Math.max(...editions.map((e) => e.vagas));
  return (
    <div>
      {editions.map((e) => (
        <div key={e.ano} className="hist-row">
          <span className={["hist-year", e.current ? "current" : ""].filter(Boolean).join(" ")}>{e.ano}</span>
          <div className={["hist-bar", e.current ? "current" : ""].filter(Boolean).join(" ")}>
            <span style={{ width: `${Math.round((e.vagas / maxV) * 100)}%` }} />
          </div>
          <span className="t-body2" style={{ width: 72, flexShrink: 0, fontWeight: 500 }}>{e.vagas} vagas</span>
          <span className="t-cap text-secondary" style={{ width: 96, flexShrink: 0, textAlign: "right" }}>{e.banca}</span>

        </div>
      ))}
    </div>
  );
}

/* ---------------- ComparePage ---------------- */
function ComparePage() {
  const { route, navigate } = useApp();
  const ids = route.params.ids || [];
  const cargos = ids.map(cargoFromKey).filter(Boolean);
  const rows = [
    { label: "Órgão", get: (c) => c.orgao },
    { label: "UF", get: (c) => c.uf },
    { label: "Banca", get: (c) => c.banca },
    { label: "Escolaridade", get: (c) => c.escolaridade },
    { label: "Remuneração", get: (c) => c.salario, hi: (c) => c.salarioNum, max: true },
    { label: "Jornada", get: (c) => c.carga_horaria },
    { label: "Vagas imediatas", get: (c) => `${c.vagas}`, hi: (c) => c.vagas, max: true },
    { label: "Cadastro reserva", get: (c) => `${c.vagas_cr}` },
    { label: "Taxa de inscrição", get: (c) => c.taxa },
    { label: "Inscrições", get: (c) => `${fmtDateShort(c.datas.inscricao_ini)} – ${fmtDateShort(c.datas.inscricao_fim)}` },
    { label: "Prova", get: (c) => fmtDateShort(c.datas.prova) },
    { label: "Aderência", get: (c) => `${Math.round(c.score * 100)}%`, hi: (c) => c.score, max: true },
  ];
  const best = (row) => {
    if (!row.hi) return null;
    let bi = 0, bv = row.hi(cargos[0]);
    cargos.forEach((c, i) => { const v = row.hi(c); if (row.max ? v > bv : v < bv) { bv = v; bi = i; } });
    return bi;
  };

  return (
    <div className="page page-wide fade-in">
      <button className="row gap-half" onClick={() => navigate("results")}
        style={{ border: "none", background: "none", cursor: "pointer", color: "var(--text-secondary)", padding: "0 0 8px", fontFamily: "inherit", fontSize: ".9rem" }}>
        <Icon name="arrow_back" size={20} /> Voltar aos resultados
      </button>
      <h1 className="t-h5" style={{ margin: "0 0 4px" }}>Comparar cargos</h1>
      <p className="t-body2 text-secondary" style={{ marginTop: 0 }}>O melhor valor de cada linha aparece destacado em verde.</p>

      <div style={{ overflowX: "auto", marginTop: 16 }}>
        <table className="compare-table">
          <thead>
            <tr>
              <th style={{ width: 180 }}></th>
              {cargos.map((c) => (
                <th key={cargoKey(c)}>
                  <div className="col gap-1" style={{ alignItems: "flex-start" }}>
                    <OrgaoIcon orgao={c.orgao} sigla={c.sigla} size={40} />
                    <span className="t-sub2" style={{ cursor: "pointer" }} onClick={() => navigate("detail", { id: cargoKey(c), from: "compare" })}>{c.nome_cargo}</span>
                  </div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row) => {
              const bi = best(row);
              return (
                <tr key={row.label}>
                  <td className="row-label">{row.label}</td>
                  {cargos.map((c, i) => (
                    <td key={cargoKey(c)} className={bi === i ? "cell-best" : ""}>
                      {row.get(c)}{bi === i && <Icon name="check_circle" size={16} className="text-secondaryc" style={{ marginLeft: 6, verticalAlign: "-3px" }} />}
                    </td>
                  ))}
                </tr>
              );
            })}
            <tr>
              <td className="row-label"></td>
              {cargos.map((c) => (
                <td key={cargoKey(c)}>
                  <Button variant="outlined" size="sm" startIcon="open_in_full" onClick={() => navigate("detail", { id: cargoKey(c), from: "compare" })}>Ver edital</Button>
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

Object.assign(window, { DetailPage, ComparePage, cargoFromKey, DateTimeline });

  </script>

  <script type="text/babel">
/* global React, Icon, Button, IconButton, Chip, Card, TextField, Select, Switch, ToggleGroup, Avatar,
   Dialog, InlineAlert, useApp, OrgaoIcon, ResultCard, cargoFromKey, cargoKey,
   TRACK_LABELS, TRACK_ICONS, TRACK_ORDER, fmtDate, fmtDateShort, MESES, UF_LIST, runSemanticSearch */
const { useState: aS, useRef: aR, useEffect: aE } = React;

/* ============ SAVED ============ */
function SavedPage() {
  const { state, navigate, patch } = useApp();
  const cargos = state.favorites.map(cargoFromKey).filter(Boolean);
  const [pending, setPending] = aS([]); // chaves marcadas para remoção (confirma ao sair)
  const [filterQ, setFilterQ] = aS('');
  const pendingRef = aR(pending); pendingRef.current = pending;
  const favsRef = aR(state.favorites); favsRef.current = state.favorites;

  // Confirma as remoções somente quando o usuário sai da página "Salvos".
  React.useEffect(() => () => {
    const p = pendingRef.current;
    if (p.length) patch({ favorites: favsRef.current.filter((k) => !p.includes(k)) });
  }, []);

  const togglePending = (c) => {
    const k = cargoKey(c);
    setPending((prev) => (prev.includes(k) ? prev.filter((x) => x !== k) : [...prev, k]));
  };

  const norm = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const qTrim = filterQ.trim();
  const visibleCargos = qTrim
    ? cargos.filter(c => norm(c.nome_cargo + ' ' + c.orgao + ' ' + c.sigla + ' ' + c.uf).includes(norm(qTrim)))
    : cargos;

  const remaining = cargos.length - pending.length;
  const subtitle = pending.length > 0
    ? `${remaining} ${remaining === 1 ? "edital salvo" : "editais salvos"} · ${pending.length} marcado${pending.length > 1 ? "s" : ""} para remoção`
    : `${cargos.length} ${cargos.length === 1 ? "edital salvo" : "editais salvos"}`;

  return (
    <div className="page fade-in">
      <PageHead icon="bookmark" title="Cargos salvos" subtitle={subtitle} />
      {cargos.length > 0 && (
        <div style={{ marginBottom: 16, maxWidth: 560 }}>
          <TextField value={filterQ} onChange={(e) => setFilterQ(e.target.value)}
            placeholder="Filtrar por cargo, órgão ou UF…" icon="search"
            endIcon={filterQ ? <IconButton name="close" size={18} btnSize="sm"
              onClick={() => setFilterQ('')}
              type="button" /> : null} />
        </div>
      )}
      {cargos.length === 0 ? (
        <EmptyState icon="bookmark_border" title="Você ainda não salvou nenhum cargo"
          text="Toque no coração nos resultados de busca para guardar editais e acompanhá-los aqui."
          action={<Button variant="contained" startIcon="search" onClick={() => navigate("home")}>Buscar cargos</Button>} />
      ) : visibleCargos.length === 0 ? (
        <div className="empty-wrap">
          <Icon name="search_off" size={44} />
          <div className="t-h6" style={{ marginTop: 14 }}>Nenhum cargo corresponde ao filtro</div>
          <Button variant="text" size="sm" startIcon="clear"
            onClick={() => setFilterQ('')}
            style={{ marginTop: 10 }}>Limpar filtro</Button>
        </div>
      ) : (
        <div className="col gap-2">
          {visibleCargos.map((c) => (
            <ResultCard key={cargoKey(c)} cargo={c}

/* ---- "Próximo passo": deriva o que importa agora a partir das datas reais do edital ---- */
const TRACK_TODAY = "2026-06-10";
function trackDays(aIso, bIso) { return Math.round((new Date(bIso + "T00:00:00") - new Date(aIso + "T00:00:00")) / 86400000); }
function trackInDays(n) { return n > 45 ? `${Math.round(n / 30)} ${Math.round(n / 30) > 1 ? "meses" : "mês"}` : (n === 1 ? "1 dia" : `${n} dias`); }
function studyingSince(desde) {
  const n = trackDays(desde, TRACK_TODAY);
  if (n <= 1) return "há pouco";
  if (n < 30) return `há ${n} dias`;
  const m = Math.round(n / 30);
  return m <= 1 ? "há 1 mês" : `há ${m} meses`;
}
function trackNextStep(c, status) {
  const d = c.datas;
  if (status === "feito") return { icon: "verified", tone: "done", label: `Resultado: ${fmtDateShort(d.resultado)}` };
  if (status === "aguardando") {
    const r = trackDays(TRACK_TODAY, d.resultado);
    return r > 0 ? { icon: "hourglass_top", tone: "soon", label: `Resultado em ${trackInDays(r)}` }
                 : { icon: "verified", tone: "done", label: "Resultado divulgado" };
  }
  if (status === "inscrito") {
    const p = trackDays(TRACK_TODAY, d.prova);
    return p > 0 ? { icon: "edit_note", tone: p <= 14 ? "urgent" : "soon", label: `Prova em ${trackInDays(p)}` }
                 : { icon: "how_to_reg", tone: "info", label: "Prova realizada" };
  }
  // quero fazer — o que importa é a janela de inscrição
  const di = trackDays(TRACK_TODAY, d.inscricao_ini);
  const df = trackDays(TRACK_TODAY, d.inscricao_fim);
  if (df < 0) return { icon: "event_busy", tone: "muted", label: "Inscrições encerradas" };
  if (di > 0) return { icon: "upcoming", tone: "info", label: `Inscrições abrem em ${trackInDays(di)}` };
  return { icon: "how_to_reg", tone: "urgent", label: `Inscreva-se · fecha em ${trackInDays(df)}` };
}

function KanbanCard({ c, status }) {
  const { navigate } = useApp();
  const step = trackNextStep(c, status);
  return (
    <div className="kanban-card" draggable
      onDragStart={(e) => e.currentTarget.dataset.drag = "1"}

          </div>

      </div>
    </div>
  );
}

/* ============ CALENDAR ============ */
function CalendarPage() {
  const { state, navigate } = useApp();
  const [month, setMonth] = aS(8); // Set 2026 (0-idx) default
  const year = 2026;
  const cargos = state.calendar.map(cargoFromKey).filter(Boolean);
  // gather events
  const events = [];
  cargos.forEach((c) => {
    events.push({ cargo: c, type: "inscricao_fim", label: "Fim das inscrições", icon: "event_busy", color: "var(--warning)", date: c.datas.inscricao_fim });
    events.push({ cargo: c, type: "prova", label: "Prova", icon: "edit_note", color: "var(--primary)", date: c.datas.prova });
    events.push({ cargo: c, type: "resultado", label: "Resultado", icon: "emoji_events", color: "var(--secondary)", date: c.datas.resultado });
  });
  const inMonth = (iso) => { const [y, m] = iso.split("-").map(Number); return y === year && m - 1 === month; };
  const monthEvents = events.filter((e) => inMonth(e.date)).sort((a, b) => a.date.localeCompare(b.date));

  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysIn = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysIn; d++) cells.push(d);
  const evForDay = (d) => events.filter((e) => { const [y, m, dd] = e.date.split("-").map(Number); return y === year && m - 1 === month && dd === d; });

  return (
    <div className="page page-wide fade-in">
      <PageHead icon="calendar_month" title="Calendário de datas"
        subtitle="Prazos de inscrição, provas e resultados dos editais que você adicionou." />
      {cargos.length === 0 ? (
        <EmptyState icon="event_busy" title="Nenhuma data no seu calendário"
          text="Abra um edital e use “Adicionar ao calendário” para acompanhar aqui os prazos de inscrição, prova e resultado."
          action={<Button variant="contained" startIcon="search" onClick={() => navigate("home")}>Buscar cargos</Button>} />
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 24, alignItems: "start" }}>
          <Card flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
            <div className="card-body">
              <div className="row spread" style={{ marginBottom: 12 }}>
                <IconButton name="chevron_left" onClick={() => setMonth((m) => Math.max(5, m - 1))} aria-label="Mês anterior" />
                <span className="t-h6">{MESES_FULL[month]} de {year}</span>
                <IconButton name="chevron_right" onClick={() => setMonth((m) => Math.min(11, m + 1))} aria-label="Próximo mês" />
              </div>
              <div className="cal-grid cal-dow">{["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"].map((d) => <div key={d} className="t-cap text-secondary" style={{ textAlign: "center", fontWeight: 600 }}>{d}</div>)}</div>
              <div className="cal-grid">
                {cells.map((d, i) => (
                  <div key={i} className={["cal-cell", d ? "" : "empty", d === 9 && month === 5 ? "today" : ""].filter(Boolean).join(" ")}>
                    {d && <span className="cal-day">{d}</span>}
                    <div className="cal-dots">
                      {evForDay(d).slice(0, 3).map((e, j) => <span key={j} className="cal-dot" style={{ background: e.color }} title={`${e.label}: ${e.cargo.sigla}`} />)}
                    </div>
                  </div>
                ))}
              </div>
              <div className="row gap-2 wrap" style={{ marginTop: 14 }}>
                <Legend color="var(--warning)" label="Inscrições" />
                <Legend color="var(--primary)" label="Prova" />
                <Legend color="var(--secondary)" label="Resultado" />
              </div>
            </div>
          </Card>

          <div className="col gap-2">
            <div className="t-overline text-secondary">Em {MESES_FULL[month]}</div>
            {monthEvents.length === 0 && <p className="t-body2 text-secondary">Nenhum evento neste mês.</p>}
            {monthEvents.map((e, i) => (
              <Card key={i} hoverable flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }} onClick={() => navigate("detail", { id: cargoKey(e.cargo), from: "calendar" })}>
                <div className="card-pad-sm row gap-1">
                  <div className="col center" style={{ width: 44, flexShrink: 0 }}>
                    <span className="t-h6" style={{ color: e.color, lineHeight: 1 }}>{e.date.split("-")[2]}</span>
                    <span className="t-cap text-secondary">{MESES[+e.date.split("-")[1] - 1]}</span>
                  </div>
                  <div className="divider v" />
                  <div className="grow" style={{ minWidth: 0 }}>
                    <div className="row gap-half"><Icon name={e.icon} size={16} style={{ color: e.color }} /><span className="t-sub2">{e.label}</span></div>
                    <div className="t-cap text-secondary truncate" style={{ marginTop: 2 }}>{e.cargo.sigla} — {e.cargo.nome_cargo}</div>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
const MESES_FULL = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
function Legend({ color, label }) { return <span className="row gap-half t-cap text-secondary"><span style={{ width: 10, height: 10, borderRadius: "50%", background: color }} />{label}</span>; }

                  onClick={() => { if (isOthers) { set("formacao", customFormacaoText || "Outros..."); } else { set("formacao", f); } }}>
                  <Icon name={sel ? "radio_button_checked" : "radio_button_unchecked"} size={22} className={sel ? "text-primaryc" : "text-secondary"} />
                  <span className="t-body1">{f}</span>
                </button>
              );
            })}
          </div>
          {(draft.formacao === "Outros..." || isCustomFormacao) && (
            <TextField label="Descreva sua formação" value={customFormacaoText} autoFocus
              onChange={(e) => { setCustomFormacaoText(e.target.value); set("formacao", e.target.value || "Outros..."); }}
              placeholder="Ex.: Engenharia Elétrica, Direito, Administração…" />
          )}
        </div>
      ),
      valid: !!draft.formacao && draft.formacao !== "Outros...",
    },
    {
      icon: "interests", title: "Quais áreas te interessam?", sub: "Selecione uma ou mais. Isso ajusta a relevância dos resultados.",
      body: (
        <>
          <div className="row wrap gap-1">
            {AREAS.map((a) => <Chip key={a} label={a} outlined={!draft.areas.includes(a)} selected={draft.areas.includes(a)} color="primary" onClick={() => toggleArr("areas", a)} icon={draft.areas.includes(a) ? "check" : undefined} />)}
            {customAreas.map((a) => <Chip key={a} label={a} selected color="primary" onDelete={() => toggleArr("areas", a)} />)}
            <Chip label="+" icon="add" outlined onClick={() => { setNewArea(""); setAddAreaOpen(true); }} />
          </div>
          <Dialog open={addAreaOpen} onClose={() => setAddAreaOpen(false)} title="Adicionar área">
            <div className="dialog-body" style={{ paddingTop: 12 }}>
              <TextField label="Nome da área" value={newArea} onChange={(e) => setNewArea(e.target.value)} autoFocus placeholder="Ex.: Machine Learning, IoT, Robótica…" />
            </div>
            <div className="dialog-actions">
              <Button variant="text" className="neutral" onClick={() => setAddAreaOpen(false)}>Cancelar</Button>
              <Button variant="contained" startIcon="add" disabled={!newArea.trim() || draft.areas.includes(newArea.trim())} onClick={() => { toggleArr("areas", newArea.trim()); setAddAreaOpen(false); }}>Adicionar</Button>
            </div>
          </Dialog>
        </>
      ),
      valid: draft.areas.length > 0,
    },
    {
      icon: "tune", title: "Salário e localização", sub: "Defina suas preferências de localização e remuneração mínima.",
      body: (
        <div className="col gap-3" style={{ maxWidth: 460 }}>
          <div>
            <div className="t-sub2" style={{ marginBottom: 10 }}>Estados de interesse</div>
            <div className="row wrap gap-1">{["Nacional", ...UF_LIST.filter((u) => u !== "Nacional")].map((u) => <Chip key={u} label={u} outlined={!draft.ufs.includes(u)} selected={draft.ufs.includes(u)} color="primary" onClick={() => toggleArr("ufs", u)} />)}</div>
          </div>
          <div>
            <div className="t-sub2" style={{ marginBottom: 4 }}>Remuneração mínima desejada</div>
            <div className="t-h5 text-primaryc" style={{ marginBottom: 8 }}>R$ {draft.salarioMin.toLocaleString("pt-BR")}</div>
            <input type="range" min="0" max="22000" step="500" value={draft.salarioMin} onChange={(e) => set("salarioMin", Number(e.target.value))} style={{ width: "100%", accentColor: "var(--primary)" }} />
            <div className="row spread t-cap text-secondary"><span>R$ 0</span><span>R$ 22.000</span></div>
          </div>
        </div>
      ),
      valid: true,
    },
  ];

  /* ── Tela de conclusão ── */
  if (step === CONCLUSION) {
    const p = state.profile;
    return (
      <div className="onb-wrap">
        <div className="onb-top"><Logo size="sm" /></div>
        <div className="onb-card-wrap">
          <Card className="elevated" style={{ maxWidth: 560, width: "100%" }}>
            <div className="onb-conclusion">
              <Icon name="check_circle" size={48} fill className="text-secondaryc" style={{ fontSize: 72 }} />
              <h1 className="t-h4" style={{ margin: "20px 0 8px" }}>Tudo pronto, {firstName}!</h1>
              <p className="t-body1 text-secondary" style={{ margin: "0 0 28px", maxWidth: 380 }}>Seu perfil está configurado. Veja um resumo do que selecionou:</p>
              <div className="onb-summary">
                <div className="onb-summary-row">
                  <span className="onb-summary-label">Formação</span>
                  <span className="t-body2">{p.formacao}</span>
                </div>
                {p.areas.length > 0 && (
                  <div className="onb-summary-row">
                    <span className="onb-summary-label">Áreas de interesse</span>
                    <div className="row wrap gap-1">{p.areas.map((a) => <Chip key={a} label={a} color="primary" size="sm" />)}</div>
                  </div>
                )}
                {p.ufs.length > 0 && (
                  <div className="onb-summary-row">
                    <span className="onb-summary-label">Localização</span>
                    <div className="row wrap gap-1">{p.ufs.map((u) => <Chip key={u} label={u} size="sm" outlined />)}</div>
                  </div>
                )}
                {p.salarioMin > 0 && (
                  <div className="onb-summary-row">
                    <span className="onb-summary-label">Remuneração mínima</span>
                    <span className="t-body2 text-primaryc" style={{ fontWeight: 600 }}>R$ {p.salarioMin.toLocaleString("pt-BR")}</span>
                  </div>
                )}
              </div>
              <Button variant="contained" size="lg" endIcon="arrow_forward" onClick={login} style={{ marginTop: 36 }}>Começar a explorar</Button>
            </div>
          </Card>
        </div>
      </div>
    );
  }

  /* ── Wizard steps 0–2 ── */
  const cur = steps[step];
  return (
    <div className="onb-wrap">
      <div className="onb-top">
        <Logo size="sm" />
        <button className="btn-text neutral" style={{ border: "none", background: "none", cursor: "pointer", color: "var(--text-secondary)", fontWeight: 600, fontSize: ".85rem" }} onClick={skipOnboarding}>Pular configuração</button>
      </div>
      <div className="onb-card-wrap">
        <Card className="elevated" style={{ maxWidth: 640, width: "100%" }}>
          <div className="card-body" style={{ padding: 40 }}>
            <div className="row gap-1" style={{ marginBottom: 6 }}>
              {steps.map((_, i) => <div key={i} style={{ height: 4, flex: 1, borderRadius: 2, background: i <= step ? "var(--primary)" : "var(--bg-sunken)", transition: "background .3s" }} />)}
            </div>
            <div className="t-cap text-secondary" style={{ marginBottom: 20 }}>Passo {step + 1} de {steps.length}</div>
            <div className="row gap-1" style={{ marginBottom: 6 }}><Icon name={cur.icon} size={28} className="text-primaryc" /><h1 className="t-h5" style={{ margin: 0 }}>{cur.title}</h1></div>
            <p className="t-body2 text-secondary" style={{ marginTop: 0, marginBottom: 28 }}>{cur.sub}</p>
            <div style={{ minHeight: 200 }}>{cur.body}</div>
            <div className="row spread" style={{ marginTop: 32 }}>
              <Button variant="text" className="neutral" startIcon="arrow_back" disabled={step === 0} onClick={() => navigate("onboarding", { step: step - 1 })}>Voltar</Button>
              {step < steps.length - 1
                ? <Button variant="contained" endIcon="arrow_forward" disabled={!cur.valid} onClick={() => navigate("onboarding", { step: step + 1 })}>Continuar</Button>
                : <Button variant="secondary" endIcon="check" disabled={!cur.valid} onClick={completeWizard}>Concluir e começar</Button>}
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}
/* ============ PROFILE ============ */
function ProfilePage() {
  const { state, patch, showToast, navigate } = useApp();
  const p = state.profile;
  const [draft, setDraft] = auS({ ...p, nome: state.user.nome, email: state.user.email });
  const [editingPersonal, setEditingPersonal] = auS(false);
  const [personalDraft, setPersonalDraft] = auS({ nome: state.user.nome, email: state.user.email });
  const [profileAddOpen, setProfileAddOpen] = auS(false);
  const [profileNewArea, setProfileNewArea] = auS("");
  const set = (k, v) => setDraft((s) => ({ ...s, [k]: v }));
  const toggleArr = (k, v) => setDraft((s) => ({ ...s, [k]: s[k].includes(v) ? s[k].filter((x) => x !== v) : [...s[k], v] }));
  const isCustomFormacaoP = !!draft.formacao && !FORMACOES.includes(draft.formacao);
  const profileCustomAreas = draft.areas.filter((a) => !AREAS.includes(a));

  const startEditPersonal = () => {
    setPersonalDraft({ nome: state.user.nome, email: state.user.email });
    setEditingPersonal(true);
  };
  const cancelEditPersonal = () => setEditingPersonal(false);
  const savePersonal = () => {
    const ini = (personalDraft.nome.trim().split(/\s+/).map((w) => w[0]).join("").slice(0, 2) || "EU").toUpperCase();
    patch({ user: { ...state.user, nome: personalDraft.nome.trim(), email: personalDraft.email.trim(), iniciais: ini } });
    setDraft((s) => ({ ...s, nome: personalDraft.nome.trim(), email: personalDraft.email.trim() }));
    setEditingPersonal(false);
    showToast("Dados pessoais atualizados");
  };

  const savePrefs = () => {
    const nivel = draft.formacao.startsWith("Superior") ? "superior" : draft.formacao.startsWith("Técnico") ? "tecnico" : "medio";
    patch({ profile: { formacao: draft.formacao, nivel, areas: draft.areas, ufs: draft.ufs, salarioMin: draft.salarioMin, onboarded: true } });
    showToast("Preferências atualizadas");
  };

  return (
    <div className="page fade-in">
      <PageHead icon="account_circle" title="Meu perfil" subtitle="Mantenha seus dados atualizados para recomendações mais precisas." />
      <div className="col gap-3" style={{ maxWidth: 680, margin: "0 auto" }}>
        <Card flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
          <div className="card-body">
            {!editingPersonal ? (
              <>
                <div className="row gap-2" style={{ marginBottom: 16 }}>
                  <Avatar size={64} round color="var(--secondary)" style={{ fontSize: 26 }}>{state.user.iniciais}</Avatar>
                  <div className="grow">
                    <div className="t-h6">{state.user.nome}</div>
                    <div className="t-body2 text-secondary">{state.user.email}</div>
                  </div>
                  <Button variant="outlined" size="sm" startIcon="edit" onClick={startEditPersonal}>Editar</Button>
                </div>
              </>
            ) : (
              <>
                <div className="row gap-half" style={{ marginBottom: 16 }}>
                  <Icon name="edit" size={18} className="text-primaryc" />
                  <span className="t-sub2">Editar dados pessoais</span>
                </div>
                <div className="row gap-2 wrap" style={{ marginBottom: 16 }}>
                  <div style={{ flex: "1 1 240px" }}><TextField label="Nome completo" value={personalDraft.nome} onChange={(e) => setPersonalDraft((s) => ({ ...s, nome: e.target.value }))} icon="person" autoFocus /></div>
                  <div style={{ flex: "1 1 240px" }}><TextField label="E-mail" value={personalDraft.email} onChange={(e) => setPersonalDraft((s) => ({ ...s, email: e.target.value }))} icon="mail" /></div>
                </div>
                <div className="row gap-1" style={{ justifyContent: "flex-end" }}>
                  <Button variant="text" className="neutral" onClick={cancelEditPersonal}>Cancelar</Button>
                  <Button variant="contained" size="sm" startIcon="check" onClick={savePersonal} disabled={!personalDraft.nome.trim() || !personalDraft.email.trim()}>Confirmar</Button>
                </div>
              </>
            )}
          </div>
        </Card>

        <Card flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
          <div className="card-body col gap-3">
            <div className="row gap-half"><Icon name="auto_awesome" size={20} className="text-secondaryc" /><span className="t-h6">Preferências de recomendação</span></div>
            <div className="col gap-2">
              <SearchableSelect label="Formação" value={isCustomFormacaoP ? "Outros..." : draft.formacao}
                onChange={(e) => { if (e.target.value === "Outros...") { set("formacao", "Outros..."); } else { set("formacao", e.target.value); } }}
                options={FORMACOES} />
              {(draft.formacao === "Outros..." || isCustomFormacaoP) && (
                <TextField label="Descreva sua formação" value={isCustomFormacaoP ? draft.formacao : ""}
                  onChange={(e) => set("formacao", e.target.value || "Outros...")}
                  placeholder="Ex.: Engenharia Elétrica, Direito, Administração…" />
              )}
            </div>
            <div>
              <div className="t-sub2" style={{ marginBottom: 10 }}>Áreas de interesse</div>
              <div className="row wrap gap-1">
                {AREAS.map((a) => <Chip key={a} label={a} outlined={!draft.areas.includes(a)} selected={draft.areas.includes(a)} color="primary" onClick={() => toggleArr("areas", a)} icon={draft.areas.includes(a) ? "check" : undefined} />)}
                {profileCustomAreas.map((a) => <Chip key={a} label={a} selected color="primary" onDelete={() => toggleArr("areas", a)} />)}
                <Chip label="+" icon="add" outlined onClick={() => { setProfileNewArea(""); setProfileAddOpen(true); }} />
              </div>
              <Dialog open={profileAddOpen} onClose={() => setProfileAddOpen(false)} title="Adicionar área">
                <div className="dialog-body" style={{ paddingTop: 12 }}>
                  <TextField label="Nome da área" value={profileNewArea} onChange={(e) => setProfileNewArea(e.target.value)} autoFocus placeholder="Ex.: Machine Learning, IoT, Robótica…" />
                </div>
                <div className="dialog-actions">
                  <Button variant="text" className="neutral" onClick={() => setProfileAddOpen(false)}>Cancelar</Button>
                  <Button variant="contained" startIcon="add" disabled={!profileNewArea.trim() || draft.areas.includes(profileNewArea.trim())} onClick={() => { toggleArr("areas", profileNewArea.trim()); setProfileAddOpen(false); }}>Adicionar</Button>
                </div>
              </Dialog>
            </div>
            <div>
              <div className="t-sub2" style={{ marginBottom: 10 }}>Estados de interesse</div>
              <div className="row wrap gap-1">{["Nacional", ...UF_LIST.filter((u) => u !== "Nacional")].map((u) => <Chip key={u} label={u} outlined={!draft.ufs.includes(u)} selected={draft.ufs.includes(u)} color="primary" onClick={() => toggleArr("ufs", u)} />)}</div>
            </div>
            <div>
              <div className="t-sub2" style={{ marginBottom: 4 }}>Remuneração mínima desejada — <span className="text-primaryc">R$ {draft.salarioMin.toLocaleString("pt-BR")}</span></div>
              <input type="range" min="0" max="22000" step="500" value={draft.salarioMin} onChange={(e) => set("salarioMin", Number(e.target.value))} style={{ width: "100%", accentColor: "var(--primary)" }} />
            </div>
          </div>
        </Card>

        <div className="row gap-1" style={{ justifyContent: "flex-end" }}>
          <Button variant="text" className="neutral" onClick={() => navigate("home")}>Cancelar</Button>
          <Button variant="contained" startIcon="save" onClick={savePrefs}>Salvar preferências</Button>
        </div>
      </div>
    </div>
  );
}

    blocks: [
      { k: "h", id: "colocacao", t: "Sua colocação" },

      { k: "h", id: "corte", t: "Nota de corte" },

    blocks: [

      { k: "note", t: "Adicione concursos pelo Acompanhamento para que apareçam aqui automaticamente." },

    blocks: [
      { k: "p", t: "Em **Meu perfil** você ajusta nome, e-mail e, principalmente, suas **preferências de recomendação**: formação, áreas de interesse, estados e remuneração mínima." },
      { k: "tip", t: "Sempre que seus objetivos mudarem, revise as áreas de interesse — elas têm grande peso nas recomendações da tela inicial." },

      ]},

const HELP_GLOSSARY = [
  { term: "Aderência", def: "Quão próximo um cargo está da sua descrição de busca, medido por similaridade semântica." },
  { term: "Banca", def: "Instituição responsável por elaborar e aplicar as provas do concurso." },
  { term: "Cadastro de reserva", def: "Lista de aprovados além do número de vagas, que podem ser convocados durante a validade do concurso." },
  { term: "Classificação / Colocação", def: "Posição do candidato na lista de aprovados, conforme a pontuação." },
  { term: "Convocação", def: "Chamada oficial de um candidato classificado para assumir a vaga." },
  { term: "Edital", def: "Documento oficial que rege o concurso: cargos, vagas, requisitos, datas e regras." },
  { term: "Nomeação", def: "Ato formal que efetiva o candidato no cargo público após a convocação." },
  { term: "Nota de corte", def: "Menor pontuação que garantiu classificação dentro do número de vagas." },
];

const HELP_FAQ = [
  { q: "O gFind faz a inscrição no concurso por mim?", a: "Não. O gFind ajuda você a encontrar, comparar e acompanhar concursos de TI. A inscrição é sempre feita no site oficial do órgão ou da banca, dentro do prazo do edital." },
  { q: "De onde vêm as informações dos editais?", a: "Os dados são sincronizados de fontes oficiais e atualizados automaticamente. Ainda assim, confirme sempre os detalhes no edital oficial antes de tomar decisões." },
  { q: "Preciso pagar para usar?", a: "As funcionalidades essenciais (busca, alertas e acompanhamento) estão disponíveis com a sua conta gratuita." },
  { q: "Por que um cargo apareceu com baixa aderência?", a: "Porque ele é apenas tangencialmente relacionado à sua busca. Ele aparece para você não perder nada relevante; refine a descrição ou use filtros para priorizar." },
  { q: "Como paro de receber avisos de um alerta?", a: "Na tela de Alertas, desative o interruptor do alerta para pausá-lo, ou exclua-o se não interessar mais." },
];

function HelpRich({ text }) {
  const parts = String(text).split(/(\*\*[^*]+\*\*)/g);
  return <>{parts.map((p, i) => (p.startsWith("**") && p.endsWith("**")) ? <strong key={i}>{p.slice(2, -2)}</strong> : <React.Fragment key={i}>{p}</React.Fragment>)}</>;
}

function HelpBlocks({ blocks }) {
  return (
    <>
      {blocks.map((b, i) => {
        if (b.k === "h") return <h2 key={i} id={b.id}><HelpRich text={b.t} /></h2>;
        if (b.k === "p") return <p key={i}><HelpRich text={b.t} /></p>;
        if (b.k === "ul") return <ul key={i}>{b.items.map((it, j) => <li key={j}><HelpRich text={it} /></li>)}</ul>;
        if (b.k === "steps") return <ol key={i} className="steps">{b.items.map((it, j) => <li key={j}><HelpRich text={it} /></li>)}</ol>;
        if (b.k === "tip" || b.k === "note") return (
          <div key={i} className={"help-tip" + (b.k === "note" ? " note" : "")}>
            <Icon name={b.k === "note" ? "info" : "lightbulb"} size={20} />
            <div className="tip-body"><HelpRich text={b.t} /></div>
          </div>
        );
        return null;
      })}
    </>
  );
}

function HelpArticle({ id }) {
  const { navigate } = useApp();
  const art = HELP_ARTICLES[id];
  const cat = HELP_CATS.find((c) => c.id === art?.cat);
  React.useEffect(() => {
    const sc = document.querySelector(".content-scroll");
    if (sc) sc.scrollTo({ top: 0 });
  }, [id]);
  if (!art) return null;
  const toc = art.blocks.filter((b) => b.k === "h");
  const related = (cat?.articles || []).filter((a) => a !== id).slice(0, 3);
  const goAnchor = (anchor) => {
    const el = document.getElementById(anchor);
    const sc = document.querySelector(".content-scroll");
    if (el && sc) {
      const r = el.getBoundingClientRect(), sr = sc.getBoundingClientRect();
      sc.scrollTo({ top: sc.scrollTop + (r.top - sr.top) - 20, behavior: "smooth" });
    }
  };
  return (
    <div className="page fade-in">
      <div className="help-breadcrumb">
        <a onClick={() => navigate("help")}>Central de Ajuda</a>
        <Icon name="chevron_right" size={16} />
        <a onClick={() => navigate("help")}>{cat?.title}</a>
        <Icon name="chevron_right" size={16} />
        <span style={{ color: "var(--text-primary)" }}>{art.title}</span>
      </div>
      <Button variant="text" className="neutral" startIcon="arrow_back" onClick={() => navigate("help")} style={{ marginBottom: 14, marginLeft: -8 }}>Voltar à ajuda</Button>
      <div className="help-article">
        <div className="help-doc">
          <h1 className="t-h4" style={{ margin: "0 0 6px" }}>{art.title}</h1>
          <div className="row gap-half t-cap text-secondary" style={{ marginBottom: 18 }}>
            <Icon name="schedule" size={15} /><span>{art.read} min de leitura</span>
          </div>
          <p className="lead">{art.lead}</p>
          <HelpBlocks blocks={art.blocks} />
          {related.length > 0 && (
            <div className="help-related">
              <div className="t-sub2" style={{ marginBottom: 12 }}>Artigos relacionados</div>
              <div className="col gap-1">
                {related.map((a) => (
                  <div key={a} className="help-related-row" onClick={() => navigate("help", { article: a })}>
                    <Icon name="description" size={18} className="text-secondary" />
                    <span className="t-body2" style={{ fontWeight: 500 }}>{HELP_ARTICLES[a].title}</span>
                    <Icon name="chevron_right" size={18} className="text-secondary" style={{ marginLeft: "auto" }} />
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        {toc.length > 0 && (
          <nav className="help-toc">
            <div className="help-toc-lab">Neste artigo</div>
            {toc.map((h) => <a key={h.id} onClick={() => goAnchor(h.id)}>{h.t}</a>)}
          </nav>
        )}
      </div>
    </div>
  );
}

function HelpHub() {
  const { navigate } = useApp();
  const [q, setQ] = auS("");
  const [openFaq, setOpenFaq] = auS(-1);
  const query = q.trim().toLowerCase();
  const open = (id) => navigate("help", { article: id });

  const matches = query
    ? Object.entries(HELP_ARTICLES)
        .filter(([, a]) => (a.title + " " + a.lead).toLowerCase().includes(query))
        .map(([id, a]) => ({ id, a }))
    : [];
  const glossMatches = query ? HELP_GLOSSARY.filter((g) => (g.term + " " + g.def).toLowerCase().includes(query)) : [];

  const popular = ["como-busca-funciona", "aderencia", "criar-alertas", "colocacao-convocacao"];

  return (
    <div className="page fade-in">
      <div className="help-hero">
        <h1 className="t-h4">Central de Ajuda</h1>
        <p className="t-body1 text-secondary" style={{ margin: "8px 0 0", maxWidth: 520, marginInline: "auto" }}>
          Aprenda a aproveitar ao máximo o gFind, da primeira busca ao acompanhamento da sua convocação.
        </p>
        <div className="help-search-wrap">
          <div className="help-search">
            <Icon name="search" size={22} className="text-secondary" />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Buscar na ajuda…" aria-label="Buscar na ajuda" />
            {q && <IconButton name="close" size={20} btnSize="sm" onClick={() => setQ("")} aria-label="Limpar" />}
          </div>
        </div>
        {!query && (
          <div className="help-quicklinks">
            {popular.map((id) => (
              <Chip key={id} label={HELP_ARTICLES[id].title} icon="bolt" size="sm" outlined onClick={() => open(id)} />
            ))}
          </div>
        )}
      </div>

      {query ? (
        <div className="col gap-3" style={{ marginTop: 24 }}>
          <div>
            <div className="t-sub1" style={{ marginBottom: 12 }}>
              {matches.length + glossMatches.length} resultado{matches.length + glossMatches.length === 1 ? "" : "s"} para “{q.trim()}”
            </div>
            {matches.length === 0 && glossMatches.length === 0 ? (
              <EmptyState icon="search_off" title="Nada encontrado" text="Tente outros termos ou navegue pelas categorias abaixo." />
            ) : (
              <div className="col gap-1">
                {matches.map(({ id, a }) => (
                  <Card key={id} flat hoverable style={{ boxShadow: "var(--e1)", borderColor: "transparent", cursor: "pointer" }} onClick={() => open(id)}>
                    <div className="card-body row" style={{ gap: 14, alignItems: "flex-start" }}>
                      <Icon name="description" size={22} className="text-primaryc" style={{ marginTop: 2 }} />
                      <div className="grow">
                        <div className="t-sub1">{a.title}</div>
                        <div className="t-body2 text-secondary" style={{ marginTop: 2 }}>{a.lead}</div>
                      </div>
                      <Icon name="chevron_right" size={20} className="text-secondary" />
                    </div>
                  </Card>
                ))}
                {glossMatches.map((g) => (
                  <Card key={g.term} flat style={{ boxShadow: "var(--e1)", borderColor: "transparent" }}>
                    <div className="card-body row" style={{ gap: 14, alignItems: "flex-start" }}>
                      <Icon name="menu_book" size={22} className="text-secondaryc" style={{ marginTop: 2 }} />
                      <div className="grow">
                        <div className="t-sub1">{g.term} <span className="t-cap text-secondary" style={{ fontWeight: 400 }}>· glossário</span></div>
                        <div className="t-body2 text-secondary" style={{ marginTop: 2 }}>{g.def}</div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}
          </div>
        </div>
      ) : (
        <div className="col" style={{ marginTop: 28, gap: 36 }}>
          <Section icon="quiz" title="Perguntas frequentes">
            <div>
              {HELP_FAQ.map((f, i) => (
                <div key={i} className={"faq-item" + (openFaq === i ? " open" : "")}>
                  <button className="faq-q" onClick={() => setOpenFaq(openFaq === i ? -1 : i)}>
                    <span>{f.q}</span>
                    <Icon name="expand_more" size={22} />
                  </button>
                  <div className="faq-a" style={{ maxHeight: openFaq === i ? 320 : 0 }}>
                    <div className="faq-a-inner">{f.a}</div>
                  </div>
                </div>
              ))}
            </div>
          </Section>

          <div className="help-grid">
            {HELP_CATS.map((c) => (
              <div key={c.id} className="help-cat" onClick={() => open(c.articles[0])}>
                <div className="help-cat-ic"><Icon name={c.icon} size={24} /></div>
                <div className="t-h6">{c.title}</div>
                <p className="t-body2 text-secondary" style={{ margin: 0 }}>{c.desc}</p>
                <div className="help-cat-arts">
                  {c.articles.map((a) => (
                    <div key={a} className="help-cat-art" onClick={(e) => { e.stopPropagation(); open(a); }}>
                      <Icon name="chevron_right" size={16} />
                      <span>{HELP_ARTICLES[a].title}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <Section icon="menu_book" title="Glossário de concursos">
            <div className="gloss-grid">
              {HELP_GLOSSARY.map((g) => (
                <div key={g.term} className="gloss-item">
                  <div className="gloss-term"><span className="gloss-dot"></span>{g.term}</div>
                  <div className="gloss-def">{g.def}</div>
                </div>
              ))}
            </div>
          </Section>

          <div className="help-support">
            <Icon name="support_agent" size={32} />
            <div className="grow">
              <div className="t-sub1">Não encontrou o que procurava?</div>
            </div>
            <Button variant="contained" startIcon="mail" onClick={() => window.open("mailto:suporte@gfind.com.br")}>Falar com o suporte</Button>
          </div>
        </div>
      )}
    </div>
  );
}

function HelpPage() {
  const { route } = useApp();
  const art = route.params?.article;
  return art && HELP_ARTICLES[art] ? <HelpArticle id={art} /> : <HelpHub />;
}

Object.assign(window, { AuthPage, OnboardingPage, ProfilePage, HelpPage, AREAS, FORMACOES });

  </script>

  <!-- app.jsx -->
  <script type="text/babel">
/* global React, ReactDOM, AppProvider, useApp, AppBar, Rail, SearchBar, Icon,
   HomePage, ResultsPage, DetailPage, ComparePage, SavedPage, TrackingPage, AlertsPage, CalendarPage, ProfilePage, HelpPage,
   AuthPage, OnboardingPage */

function Toast() {
  const { toast } = useApp();
  if (!toast) return null;
  return (
    <div className="snackbar">
      <span className="grow">{toast.msg}</span>
      {toast.action && <span className="snack-action" onClick={toast.action.onClick}>{toast.action.label}</span>}
    </div>
  );
}

const SHELL_SEARCH = new Set(["results", "detail", "compare"]);

function Shell({ children }) {
  const { route, navigate } = useApp();
  const showSearch = SHELL_SEARCH.has(route.name);
  return (
    <div className="app-root">
      <AppBar showSearch={showSearch} searchProps={{
        compact: true,
        initialQuery: route.params?.q || "",
        initialOnlyTi: !!route.params?.ti,
        onSearch: (q, ti) => navigate("results", { q, ti }),
      }} />
      <div className="shell">
        <Rail />
        <div className="content content-scroll">{children}</div>
      </div>
    </div>
  );
}

function Router() {
  const { route } = useApp();
  const { name } = route;

  // Full-screen (no shell)
  if (name === "auth") return <><AuthPage /><Toast /></>;
  if (name === "onboarding") return <><OnboardingPage /><Toast /></>;

  let page = null;
  switch (name) {
    case "home": page = <HomePage />; break;
    case "results": page = <ResultsPage />; break;
    case "detail": page = <DetailPage />; break;
    case "compare": page = <ComparePage />; break;
    case "saved": page = <SavedPage />; break;
    case "tracking": page = <TrackingPage />; break;
    case "alerts": page = <AlertsPage />; break;
    case "calendar": page = <CalendarPage />; break;
    case "profile": page = <ProfilePage />; break;
    case "help": page = <HelpPage />; break;
    default: page = <HomePage />;
  }
  return <><Shell>{page}</Shell><Toast /></>;
}

function App() {
  return (
    <AppProvider>
      <Router />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
